[build]
rustflags = [
    "-D", "warnings",
    "-D", "clippy::all",
    "-D", "clippy::pedantic",
    "-D", "clippy::cargo",
    "-A", "clippy::module_name_repetitions",
]

[alias]
audit-full  = "audit --deny warnings"
lint        = "clippy --all-targets --all-features -- -D warnings"
cov         = "llvm-cov --all-features --workspace --lcov --output-path lcov.info"
