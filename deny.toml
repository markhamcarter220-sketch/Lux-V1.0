[advisories]
db-path   = "~/.cargo/advisory-db"
db-urls   = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained  = "warn"
yanked        = "deny"
notice        = "warn"

[licenses]
unlicensed     = "deny"
allow          = ["Apache-2.0", "MIT", "MIT-0", "ISC", "Unicode-DFS-2016"]
copyleft       = "deny"
allow-osi-fsf-free = "neither"
default        = "deny"

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
