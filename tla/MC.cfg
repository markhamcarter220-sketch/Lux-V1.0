\* TLC configuration -- Lux Kernel security theorems.
\* Run: java -XX:+UseParallelGC -jar tla2tools.jar MC.tla -config MC.cfg -workers 4

INIT Init
NEXT Next

CONSTANTS
    AllRights    <- MCAllRights
    Principals   <- MCPrincipals
    Nodes        <- MCNodes
    MaxNonce     <- MCMaxNonce
    MaxResources <- MCMaxResources
    MaxEpoch     <- MCMaxEpoch
    MaxCaps      <- MCMaxCaps
    BootEdges    <- MCBootEdges

INVARIANT TypeOK
INVARIANT NonEscalation
INVARIANT RevocationSoundness
INVARIANT ResourceAtomicity
INVARIANT TopologyBoundedness
INVARIANT AllSecurityInvariantsHold
